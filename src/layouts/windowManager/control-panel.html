<div class="control-layout" id="cp-main">
  <div class="control-icon" onclick="openCPColor(this)">
    {{ICON_CP_COLOR}}
    <div class="control-label">Color</div>
  </div>
  <div class="control-icon" onclick="openCPDesktop(this)">
    {{ICON_DESKTOP_CP}}
    <div class="control-label">Desktop</div>
  </div>
  <div class="control-icon" onclick="openCPScreensaver(this)">
    {{ICON_SCREENSAVER}}
    <div class="control-label">Screensaver</div>
  </div>
  <div class="control-icon" onclick="openCPSound(this)">
    {{ICON_VOLUME}}
    <div class="control-label">Sound</div>
  </div>
  <div class="control-icon" onclick="openCPFonts(this)">
    <svg viewBox="0 0 32 32" class="svg-icon">
      <rect x="4" y="8" width="24" height="16" fill="none" stroke="black" />
      <text
        x="16"
        y="20"
        font-family="serif"
        font-size="10"
        text-anchor="middle"
      >
        ABC
      </text>
    </svg>
    <div class="control-label">Fonts</div>
  </div>
  <div class="control-icon">
    <svg viewBox="0 0 32 32" class="svg-icon">
      <rect x="10" y="6" width="12" height="20" fill="none" stroke="black" />
      <circle cx="16" cy="12" r="2" fill="black" />
    </svg>
    <div class="control-label">Mouse</div>
  </div>
  <div class="control-icon">
    <svg viewBox="0 0 32 32" class="svg-icon">
      <rect x="2" y="10" width="28" height="12" fill="none" stroke="black" />
    </svg>
    <div class="control-label">Keyboard</div>
  </div>
</div>
