<div class="mplayer-layout">
  <div class="mplayer-screen">
    <video class="mplayer-video" playsinline></video
    ><canvas id="mplayer-canvas" width="300" height="150"></canvas>
    <div class="mplayer-overlay">
      <div class="mplayer-track-label">
        Track: <span class="mplayer-track-name">Loading…</span>
      </div>
      <div class="mplayer-seek-row">
        <span class="mplayer-time mplayer-current">0:00</span
        ><input
          type="range"
          class="mplayer-seek"
          min="0"
          max="100"
          value="0"
          aria-label="Seek"
        /><span class="mplayer-time mplayer-duration">0:00</span>
      </div>
    </div>
  </div>
  <div class="mplayer-controls">
    <select class="mplayer-track-select" aria-label="Choose track"></select>
    <div class="mplayer-btn" onclick="toggleMedia(this, 'play')">▶</div>
    <div class="mplayer-btn" onclick="toggleMedia(this, 'pause')">||</div>
    <div class="mplayer-btn" onclick="toggleMedia(this, 'stop')">■</div>
    <label class="mplayer-load-btn"
      >Open<input
        class="mplayer-file-input"
        type="file"
        accept="audio/*,video/*"
        multiple
    /></label>
  </div>
  <div class="mplayer-status">
    <span class="mplayer-file-name"
      >Load mp3 or video files from your computer to play them here.</span
    >
  </div>
</div>
